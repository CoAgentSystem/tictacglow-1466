<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacGlow - Modern Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#10b981',
                        dark: '#0f172a',
                        glass: 'rgba(255, 255, 255, 0.1)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white font-['Inter'] min-h-screen flex flex-col items-center justify-center p-4">
    <header class="text-center mb-8">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">TicTacGlow</h1>
        <p class="text-gray-400 mt-2">A sleek, modern Tic-Tac-Toe experience</p>
    </header>
    <main class="w-full max-w-md">
        <div class="bg-glass backdrop-blur-lg rounded-2xl p-6 shadow-2xl border border-gray-700">
            <div class="flex justify-between items-center mb-6">
                <div class="text-lg">Current Player: <span id="current-player" class="font-bold text-primary">X</span></div>
                <button id="reset-btn" class="px-4 py-2 bg-primary hover:bg-purple-700 rounded-lg transition duration-300">Reset Game</button>
            </div>
            <div id="game-board" class="grid grid-cols-3 gap-4 mb-6">
                <!-- Cells will be generated by JavaScript -->
            </div>
            <div class="text-center">
                <div id="status" class="text-xl font-semibold mb-4">Game in progress</div>
                <div class="flex justify-between text-gray-300">
                    <div>X Wins: <span id="x-wins" class="font-bold">0</span></div>
                    <div>O Wins: <span id="o-wins" class="font-bold">0</span></div>
                    <div>Draws: <span id="draws" class="font-bold">0</span></div>
                </div>
            </div>
        </div>
        <div class="mt-8 text-center text-gray-500 text-sm">
            <p>Play against AI or switch turns manually. Enjoy the glow!</p>
        </div>
    </main>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
